# Alfred local development stack.
#
# Start everything:
#   docker compose up --build
#
# Run in the background:
#   docker compose up -d --build
#
# Stop without deleting data:
#   docker compose down
#
# Stop and wipe local container data:
#   docker compose down -v

name: alfred

x-api-build: &api-build
  context: .
  dockerfile: apps/alfred/Dockerfile

x-alfred-env-files: &alfred-env-files
  - path: .env
    required: false
  - path: .env.local
    required: false
  - path: apps/alfred/.env
    required: false
  - path: apps/alfred/.env.local
    required: false

x-api-env: &api-env
  APP_ENV: dev
  PYTHONDONTWRITEBYTECODE: "1"
  DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/alfred
  ALFRED_WRITER_CHECKPOINT_DSN: postgresql://postgres:postgres@postgres:5432/alfred
  REDIS_URL: redis://redis:6379/0
  NEO4J_URI: ${NEO4J_URI:-bolt://neo4j:7687}
  NEO4J_USER: ${NEO4J_USER:-neo4j}
  NEO4J_PASSWORD: ${NEO4J_PASSWORD:-neo4j_password}
  QDRANT_URL: http://qdrant:6333
  QDRANT_LOCAL_URL: http://qdrant:6333
  QDRANT_PREFER_LOCAL: "true"
  QDRANT_API_KEY: ""
  FIRECRAWL_BASE_URL: http://firecrawl:3002/v1
  SEARXNG_HOST: http://searxng:8080
  SEARX_HOST: http://searxng:8080
  ALFRED_NOTES_FILESYSTEM_ROOTS: ${HOME}
  TOKEN_STORE_DIR: /app/.alfred_data/tokens
  CORS_ALLOW_ORIGINS: '["*"]'

x-api-volumes: &api-volumes
  - ./apps:/app/apps
  - ./.alfred_data:/app/.alfred_data
  - ./data:/app/data
  - ${HOME}:${HOME}:ro

services:
  # Core infrastructure

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: alfred
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${ALFRED_POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d alfred"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis/redis-stack-server:latest
    volumes:
      - redisdata:/data
    ports:
      - "${ALFRED_REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  qdrant:
    image: qdrant/qdrant:latest
    volumes:
      - qdrantdata:/qdrant/storage
    ports:
      - "${QDRANT_HTTP_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"

  meilisearch:
    image: getmeili/meilisearch:latest
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-local-dev-master-key}
      MEILI_ENV: development
      MEILI_LOG_LEVEL: INFO
    volumes:
      - meilisearchdata:/meili_data
    ports:
      - "${MEILISEARCH_PORT:-7700}:7700"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:7700/health"]
      interval: 5s
      timeout: 5s
      retries: 20

  tika:
    image: apache/tika:latest
    ports:
      - "${TIKA_PORT:-9998}:9998"

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-local-dev-master-key}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    volumes:
      - ./infra/litellm/config.yaml:/app/config.yaml:ro
    ports:
      - "${LITELLM_PORT:-4000}:4000"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  gotenberg:
    image: gotenberg/gotenberg:latest
    ports:
      - "${GOTENBERG_PORT:-3030}:3000"

  n8n:
    image: n8nio/n8n:latest
    environment:
      N8N_BASIC_AUTH_ACTIVE: "false"
      WEBHOOK_URL: "http://localhost:${N8N_PORT:-5678}/"
      N8N_HOST: 0.0.0.0
      N8N_PORT: "5678"
      N8N_PROTOCOL: http
      GENERIC_TIMEZONE: ${GENERIC_TIMEZONE:-America/Los_Angeles}
    volumes:
      - n8ndata:/home/node/.n8n
    ports:
      - "${N8N_PORT:-5678}:5678"

  searxng:
    image: searxng/searxng:latest
    environment:
      BASE_URL: "http://localhost:${SEARXNG_PORT:-8090}/"
      INSTANCE_NAME: alfred
    volumes:
      - ./infra/searxng/settings.yml:/etc/searxng/settings.yml:ro
    ports:
      - "${SEARXNG_PORT:-8090}:8080"

  # Firecrawl self-hosted stack

  firecrawl-playwright:
    image: ${FIRECRAWL_PLAYWRIGHT_IMAGE:-ghcr.io/firecrawl/playwright-service:latest}
    environment:
      PORT: "3000"
      PROXY_SERVER: ${PROXY_SERVER:-}
      PROXY_USERNAME: ${PROXY_USERNAME:-}
      PROXY_PASSWORD: ${PROXY_PASSWORD:-}
      ALLOW_LOCAL_WEBHOOKS: ${ALLOW_LOCAL_WEBHOOKS:-true}
      BLOCK_MEDIA: ${BLOCK_MEDIA:-false}
      MAX_CONCURRENT_PAGES: ${FIRECRAWL_CRAWL_CONCURRENT_REQUESTS:-4}
    shm_size: "2gb"

  firecrawl-redis:
    image: redis:7-alpine
    volumes:
      - firecrawl_redisdata:/data
    command: redis-server --bind 0.0.0.0
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s

  firecrawl-rabbitmq:
    image: rabbitmq:3-management-alpine
    volumes:
      - firecrawl_rabbitmqdata:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_running"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  firecrawl-postgres:
    image: ${FIRECRAWL_POSTGRES_IMAGE:-ghcr.io/firecrawl/nuq-postgres:latest}
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - firecrawl_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  firecrawl:
    image: ${FIRECRAWL_IMAGE:-ghcr.io/firecrawl/firecrawl:latest}
    restart: unless-stopped
    environment:
      HOST: 0.0.0.0
      PORT: "3002"
      INTERNAL_PORT: "3002"
      EXTRACT_WORKER_PORT: "3004"
      WORKER_PORT: "3005"
      ENV: local
      USE_DB_AUTHENTICATION: "false"
      REDIS_URL: redis://firecrawl-redis:6379
      REDIS_RATE_LIMIT_URL: redis://firecrawl-redis:6379
      PLAYWRIGHT_MICROSERVICE_URL: http://firecrawl-playwright:3000/scrape
      NUQ_RABBITMQ_URL: amqp://firecrawl-rabbitmq:5672
      POSTGRES_HOST: firecrawl-postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      NUQ_DATABASE_URL: postgresql://postgres:postgres@firecrawl-postgres:5432/postgres
      BULL_AUTH_KEY: ${FIRECRAWL_BULL_AUTH_KEY:-alfred-dev}
      NUM_WORKERS_PER_QUEUE: ${FIRECRAWL_NUM_WORKERS_PER_QUEUE:-2}
      CRAWL_CONCURRENT_REQUESTS: ${FIRECRAWL_CRAWL_CONCURRENT_REQUESTS:-4}
      MAX_CONCURRENT_JOBS: ${FIRECRAWL_MAX_CONCURRENT_JOBS:-2}
      BROWSER_POOL_SIZE: ${FIRECRAWL_BROWSER_POOL_SIZE:-2}
      MAX_CPU: ${FIRECRAWL_MAX_CPU:-0.95}
      MAX_RAM: ${FIRECRAWL_MAX_RAM:-0.95}
      SEARXNG_ENDPOINT: http://searxng:8080
      HARNESS_STARTUP_TIMEOUT_MS: ${FIRECRAWL_HARNESS_STARTUP_TIMEOUT_MS:-120000}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    command: node dist/src/harness.js --start-docker
    ports:
      - "${FIRECRAWL_PORT:-3002}:3002"
    depends_on:
      firecrawl-playwright:
        condition: service_started
      firecrawl-redis:
        condition: service_healthy
      firecrawl-rabbitmq:
        condition: service_healthy
      firecrawl-postgres:
        condition: service_healthy
      searxng:
        condition: service_started

  search-gateway:
    build: *api-build
    env_file: *alfred-env-files
    environment:
      <<: *api-env
      SEARCH_GATEWAY_FIRECRAWL_URL: http://firecrawl:3002/v1
      SEARCH_GATEWAY_SEARXNG_URL: http://searxng:8080
      SEARCH_GATEWAY_QDRANT_URL: http://qdrant:6333
      SEARCH_GATEWAY_MEILISEARCH_URL: http://meilisearch:7700
      SEARCH_GATEWAY_TIKA_URL: http://tika:9998
      SEARCH_GATEWAY_LITELLM_URL: http://litellm:4000
      SEARCH_GATEWAY_LITELLM_KEY: ${LITELLM_MASTER_KEY:-local-dev-master-key}
      SEARCH_GATEWAY_GOTENBERG_URL: http://gotenberg:3000
      SEARCH_GATEWAY_N8N_URL: http://n8n:5678
    command: >
      uvicorn alfred.search_gateway:app
        --host 0.0.0.0
        --port 8010
        --reload
        --reload-dir /app/apps/alfred
    volumes: *api-volumes
    ports:
      - "${SEARCH_GATEWAY_PORT:-8010}:8010"
    depends_on:
      qdrant:
        condition: service_started
      meilisearch:
        condition: service_healthy
      tika:
        condition: service_started
      litellm:
        condition: service_started
      gotenberg:
        condition: service_started
      searxng:
        condition: service_started
      firecrawl:
        condition: service_started

  # Alfred backend

  migrate:
    build: *api-build
    env_file: *alfred-env-files
    environment:
      <<: *api-env
    command: alembic -c alembic.ini upgrade head
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    build: *api-build
    env_file: *alfred-env-files
    environment:
      <<: *api-env
    command: >
      uvicorn alfred.main:app
        --host 0.0.0.0
        --port 8000
        --reload
        --reload-dir /app/apps/alfred
    volumes: *api-volumes
    ports:
      - "${ALFRED_API_PORT:-8000}:8000"
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
      searxng:
        condition: service_started
      firecrawl:
        condition: service_started

  worker:
    build: *api-build
    env_file: *alfred-env-files
    environment:
      <<: *api-env
    command: >
      celery -A alfred.celery_app.app worker
        -l INFO
        --concurrency=2
        -Q default,llm,agent
    volumes: *api-volumes
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
      searxng:
        condition: service_started
      firecrawl:
        condition: service_started

  beat:
    build: *api-build
    env_file: *alfred-env-files
    environment:
      <<: *api-env
    command: celery -A alfred.celery_app.app beat -l INFO
    volumes: *api-volumes
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  # Alfred frontend

  frontend:
    build:
      context: ./web
      dockerfile: Dockerfile.dev
    env_file:
      - path: web/.env
        required: false
      - path: web/.env.local
        required: false
    environment:
      ALFRED_API_BASE_URL: http://api:8000
      NEXT_PUBLIC_API_BASE_URL: "http://localhost:${ALFRED_API_PORT:-8000}"
      NEXT_PUBLIC_API_URL: "http://localhost:${ALFRED_API_PORT:-8000}"
      WATCHPACK_POLLING: "true"
    volumes:
      - ./web:/app
      - frontend_node_modules:/app/node_modules
      - /app/.next
    ports:
      - "${ALFRED_WEB_PORT:-3010}:3000"
    depends_on:
      api:
        condition: service_started

  # Optional graph database. Start with:
  #   docker compose --profile graph up --build

  neo4j:
    image: neo4j:5
    profiles: ["graph"]
    environment:
      NEO4J_AUTH: neo4j/neo4j_password
    volumes:
      - neo4jdata:/data
    ports:
      - "${NEO4J_HTTP_PORT:-17474}:7474"
      - "${NEO4J_BOLT_PORT:-17687}:7687"
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p neo4j_password 'RETURN 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30

volumes:
  pgdata:
  redisdata:
  qdrantdata:
  meilisearchdata:
  n8ndata:
  firecrawl_pgdata:
  firecrawl_redisdata:
  firecrawl_rabbitmqdata:
  neo4jdata:
  frontend_node_modules:
