substitutions:
  _REGION: us-central1
  _SERVICE: alfred-api
  _REPOSITORY: alfred
  _IMAGE: alfred-api
  _LATEST_TAG: latest

tags:
  - alfred-api
  - deploy

steps:
  - name: gcr.io/cloud-builders/docker
    id: build
    args:
      - build
      - '-f'
      - apps/alfred/Dockerfile
      - '-t'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE}:$SHORT_SHA'
      - '-t'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE}:${_LATEST_TAG}'
      - '.'

  - name: gcr.io/cloud-builders/docker
    id: push-sha
    args:
      - push
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE}:$SHORT_SHA'

  - name: gcr.io/cloud-builders/docker
    id: push-latest
    args:
      - push
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE}:${_LATEST_TAG}'

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: deploy
    entrypoint: gcloud
    waitFor:
      - push-sha
      - push-latest
    args:
      - run
      - deploy
      - '${_SERVICE}'
      - '--image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE}:$SHORT_SHA'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--cpu=1'
      - '--memory=1Gi'
      - '--max-instances=3'
      - '--port=8000'

images:
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE}:$SHORT_SHA'
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE}:${_LATEST_TAG}'

options:
  logging: CLOUD_LOGGING_ONLY
