repos:
  - repo: local
    hooks:
      - id: ruff-lint
        name: ruff lint
        entry: uv run ruff check
        language: system
        types_or: [python]
        pass_filenames: true
        require_serial: true

      - id: ruff-format
        name: ruff format (check)
        entry: uv run ruff format --check
        language: system
        types_or: [python]
        pass_filenames: true
        require_serial: true

      - id: env-access-guardrail
        # Belt-and-suspenders: ruff's TID251 already covers this in `make lint`,
        # but running it at pre-commit time gives an earlier, more focused error.
        name: ban os.getenv outside settings.py
        entry: python3 scripts/check_env_access.py
        language: system
        pass_filenames: false
        always_run: true

      - id: env-example-parity
        name: .env.example must document every Settings field
        entry: python3 scripts/check_env_example_parity.py
        language: system
        pass_filenames: false
        files: ^(apps/alfred/core/settings\.py|apps/alfred/\.env\.example)$
